; platformio.ini — PlatformIO build for the E-Book Keychain
; ============================================================
; Quick start:
;   pip install platformio
;   cd program
;   pio run -t upload
;
; Adjust `board` if you have the 1.69" variant.
; ============================================================

[env:esp32c6-lcd-147]
platform        = espressif32
board           = esp32-c6-devkitc
framework       = arduino
monitor_speed   = 115200
board_build.partitions = default.csv
board_build.f_flash     = 80000000L
board_build.flash_mode  = qio

; -- variants --
; [env:esp32c6-lcd-169]
; board = esp32-c6-devkitc
; build_flags = -DBOARD=BOARD_169

; ---------------- libraries ----------------
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  fastled/FastLED@^3.9.0
  earlephilhower/ESP8266Audio@^1.9.7
  bblanchon/ArduinoJson@^7.0.0   ; optional, for richer settings

; ---------------- board flags ----------------
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD=BOARD_147
  -DUSER_SETUP_LOADED=1
  -include "$PROJECT_DIR/include/config.h"

; ---------------- custom TFT_eSPI setup ----------------
; The TFT_eSPI library expects its own User_Setup.h at
; libraries/TFT_eSPI/User_Setup.h.  We symlink ours in via
; `extra_scripts` so the build is reproducible.
extra_scripts = pre:scripts/copy_user_setup.py
